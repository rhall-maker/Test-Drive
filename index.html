<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apex Drive | Premium Test Drive Experience</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --asphalt: #0d1117;
      --garage: #161b22;
      --electric-blue: #9BCFFF; /* Matches your GoMeddo primary color */
      --neon-glow: #38bdf8;
      --silver: #8b949e;
      --chalk: #f0f6fc;
      --white: #ffffff;
      --border-line: rgba(240, 246, 252, 0.1);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--asphalt);
      color: var(--chalk);
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 200;
      background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-line);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 3rem; height: 75px;
    }
    .nav-logo {
      font-family: 'Orbitron', sans-serif; font-weight: 800;
      font-size: 1.4rem; color: var(--white); letter-spacing: 0.05em;
    }
    .nav-logo span { color: var(--electric-blue); }
    .nav-links { display: flex; list-style: none; gap: 2rem; }
    .nav-links a {
      font-size: 0.85rem; font-weight: 600; color: var(--silver);
      text-decoration: none; text-transform: uppercase; letter-spacing: 0.1em;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--white); }
    .nav-btn {
      background: var(--electric-blue); color: var(--asphalt);
      padding: 0.6rem 1.5rem; font-size: 0.8rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em; border: none;
      cursor: pointer; transition: transform 0.2s;
    }
    .nav-btn:hover { transform: translateY(-2px); }

    /* ── PERFORMANCE HERO ── */
    .hero {
      min-height: 100vh; display: flex; align-items: center;
      background: radial-gradient(circle at 80% 50%, var(--garage) 0%, var(--asphalt) 100%);
      padding: 0 5rem; padding-top: 75px;
    }
    .hero-content { max-width: 650px; }
    .hero-tag {
      font-family: 'Orbitron', sans-serif; font-size: 0.8rem; font-weight: 800;
      color: var(--electric-blue); letter-spacing: 0.3em; margin-bottom: 1.5rem;
      text-transform: uppercase;
    }
    h1 {
      font-family: 'Orbitron', sans-serif; font-weight: 800;
      font-size: clamp(2.5rem, 5.5vw, 4.5rem); line-height: 1.1;
      color: var(--white); text-transform: uppercase; margin-bottom: 2rem;
    }
    h1 em { font-style: italic; color: transparent; -webkit-text-stroke: 1px var(--white); }
    .hero-sub {
      font-size: 1.1rem; line-height: 1.7; color: var(--silver);
      margin-bottom: 3.5rem; font-weight: 300;
    }

    /* ── THE FLEET (UNDER THE FOLD) ── */
    .fleet { padding: 8rem 0; background: var(--garage); border-top: 1px solid var(--border-line); }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
    .section-title {
      font-family: 'Orbitron', sans-serif; font-size: 2rem; text-transform: uppercase;
      margin-bottom: 4rem; letter-spacing: 0.05em;
    }
    .fleet-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
    .vehicle-card {
      background: var(--asphalt); border: 1px solid var(--border-line);
      padding: 2.5rem; position: relative; transition: all 0.3s ease;
      cursor: pointer;
    }
    .vehicle-card:hover {
      border-color: var(--electric-blue); transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(155, 207, 255, 0.05);
    }
    .vehicle-class { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--electric-blue); letter-spacing: 0.1em; }
    .vehicle-name { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; margin: 0.5rem 0 1.5rem; color: var(--white); }
    .vehicle-specs { display: flex; gap: 1.5rem; font-size: 0.8rem; color: var(--silver); }
    .spec-item strong { color: var(--white); display: block; font-size: 1rem; margin-bottom: 0.2rem; }

    /* ── BOOKING ENGINE ── */
    .booking-container { padding: 8rem 0; background: var(--asphalt); border-top: 1px solid var(--border-line); }
    .booking-header { margin-bottom: 4rem; border-left: 4px solid var(--electric-blue); padding-left: 2rem; }
    .booking-header h2 { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; text-transform: uppercase; }

    @media (max-width: 960px) {
      .hero { padding: 0 2rem; }
      .fleet-grid { grid-template-columns: 1fr; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">APEX <span>DRIVE</span></div>
  <ul class="nav-links">
    <li><a href="#fleet">The Fleet</a></li>
    <li><a href="#scheduler">Book Session</a></li>
  </ul>
